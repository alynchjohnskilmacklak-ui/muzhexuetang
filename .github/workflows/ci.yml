name: CI
on:
  push: { branches: ["**"] }
  pull_request: { branches: ["**"] }
concurrency: { group: ci-${{ github.ref }}, cancel-in-progress: true }
jobs:
  check:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: edu-manage } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: edu-manage/.nvmrc, cache: npm, cache-dependency-path: edu-manage/package-lock.json }
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npx tsc --noEmit
      - run: npm run lint
